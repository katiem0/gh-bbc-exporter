name: Stale Pull Requests

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale pull requests
    runs-on: ubuntu-latest
    steps:
      - name: Close stale pull requests
        uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >-
            This pull request has been automatically marked as stale after 14 days
            of inactivity. It will be closed in 7 days if there is no further
            activity.
          close-pr-message: >-
            Closing this pull request due to 21 days of inactivity. Please reopen
            or create a new pull request if you want to continue this work.
          days-before-issue-stale: -1
          days-before-issue-close: -1
